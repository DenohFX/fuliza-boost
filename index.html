<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FulizaBoost</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f3f4f6;
  margin: 0;
  padding: 20px;
  text-align: center;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 20px;
  max-width: 400px;
  margin: auto;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.box {
  padding: 15px;
  border-radius: 12px;
  background: #f9fafb;
  cursor: pointer;
}

.box.active {
  border: 2px solid #16a34a;
  background: #e8f5e9;
}

.fee {
  font-size: 12px;
  color: #777;
  margin-top: 5px;
}

.bottom-btn {
  position: fixed;
  bottom: 10px;
  left: 10px;
  right: 10px;
  background: #16a34a;
  color: white;
  padding: 16px;
  border-radius: 14px;
  font-weight: bold;
  text-align: center;
}

.activity {
  background:#f1f5f9;
  padding:12px;
  border-radius:12px;
  margin:15px 0;
  text-align:left;
}

.modal {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.4);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-content {
  background:white;
  padding:20px;
  border-radius:20px;
  width:90%;
  max-width:400px;
}

.input {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ddd;
}
</style>
</head>

<body>

<div id="app"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Complete Upgrade</h3>
    <input class="input" placeholder="Enter ID Number">
    <input class="input" placeholder="Enter Phone Number">
    <br><br>
    <button onclick="closeModal()">Cancel</button>
    <button class="bottom-btn" style="position:static;">Submit</button>
  </div>
</div>

<script>
let selectedAmount = 12500;

const limits = [
  {amount:3000, fee:250},
  {amount:5000, fee:293},
  {amount:7500, fee:350},
  {amount:10000, fee:500},
  {amount:12500, fee:747},
  {amount:16000, fee:898},
  {amount:21000, fee:1015},
  {amount:25500, fee:1220},
  {amount:30000, fee:1533},
  {amount:35000, fee:1730},
  {amount:45000, fee:2000},
  {amount:60000, fee:2250},
  {amount:70000, fee:2500}
];

const activities = [
 "Brian O. (0725****80) boosted to Ksh 21,000",
 "Faith W. (0712****11) boosted to Ksh 45,000",
 "Kevin M. (0798****22) boosted to Ksh 30,000",
 "Diana K. (0704****09) boosted to Ksh 12,500"
];

let i = 0;

function render(){
  document.getElementById("app").innerHTML = `
  <div class="card">

    <h2>FulizaBoost</h2>

    <div class="activity">
      <b>LIVE ACTIVITY</b><br>
      <span id="liveText">${activities[i]}</span>
    </div>

    <div class="grid">
      ${limits.map(l=>`
        <div class="box ${l.amount===selectedAmount?'active':''}" onclick="select(${l.amount})">
          <strong>Ksh ${l.amount}</strong>
          <div class="fee">FEE: KSH ${l.fee}</div>
        </div>
      `).join("")}
    </div>

  </div>

  <div class="bottom-btn" onclick="openModal()">
    UPGRADE TO KSH ${selectedAmount}
  </div>
  `;
}

function select(a){
  selectedAmount = a;
  render();
}

function openModal(){
  document.getElementById("modal").style.display = "flex";
}

function closeModal(){
  document.getElementById("modal").style.display = "none";
}

/* LIVE ACTIVITY ROTATION */
setInterval(()=>{
  i = (i + 1) % activities.length;
  const el = document.getElementById("liveText");
  if(el) el.innerText = activities[i];
}, 2500);

render();
</script>

</body>
</html>
