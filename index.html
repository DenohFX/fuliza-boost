<!DOCTYPE html>
<html>
<head>
  <title>Fuliza Boost</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #020617, #0f172a);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .app {
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    .logo {
      font-size: 26px;
      font-weight: bold;
      color: #38bdf8;
      margin-bottom: 20px;
    }

    .card {
      background: #111827;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }

    h2 {
      margin-bottom: 10px;
    }

    p {
      font-size: 13px;
      color: #9ca3af;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border-radius: 8px;
      border: none;
      outline: none;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      background: #22c55e;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #16a34a;
    }

    .loading {
      margin-top: 15px;
      display: none;
      color: #38bdf8;
    }

    .result-box {
      margin-top: 15px;
      padding: 15px;
      background: #020617;
      border-radius: 10px;
      display: none;
    }

    .amount {
      font-size: 22px;
      color: #22c55e;
      font-weight: bold;
    }

  </style>
</head>

<body>

<div class="app">
  <div class="logo">Fuliza Boost 🚀</div>

  <div class="card">
    <h2>Check Your Limit</h2>
    <p>Enter your Safaricom number</p>

    <input type="text" id="phone" placeholder="07XXXXXXXX">

    <button onclick="checkLimit()">Check Now</button>

    <div class="loading" id="loading">⏳ Processing request...</div>

    <div class="result-box" id="resultBox">
      <p>Your Fuliza Limit:</p>
      <div class="amount" id="amount"></div>
    </div>
  </div>
</div>

<script>
function checkLimit() {
  const phone = document.getElementById("phone").value;
  const loading = document.getElementById("loading");
  const resultBox = document.getElementById("resultBox");
  const amount = document.getElementById("amount");

  if (phone === "") {
    alert("Enter phone number");
    return;
  }

  resultBox.style.display = "none";
  loading.style.display = "block";

  setTimeout(() => {
    loading.style.display = "none";
    resultBox.style.display = "block";

    let value = Math.floor(Math.random() * 5000) + 500;
    amount.innerHTML = "KES " + value;
  }, 2000);
}
</script>

</body>
</html>
