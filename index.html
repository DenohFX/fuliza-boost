<!DOCTYPE html>
<html>
<head>
  <title>Fuliza Boost</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #020617);
      color: white;
    }

    .container {
      max-width: 400px;
      margin: auto;
      padding: 20px;
      text-align: center;
    }

    h1 {
      color: #38bdf8;
      margin-top: 20px;
    }

    .card {
      background: #111827;
      padding: 25px;
      border-radius: 12px;
      margin-top: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }

    h2 {
      margin-bottom: 10px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
      outline: none;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #22c55e;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    .result {
      margin-top: 15px;
      color: #9ca3af;
      font-size: 14px;
    }

    .footer {
      margin-top: 30px;
      font-size: 12px;
      color: #6b7280;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Fuliza Boost 🚀</h1>

  <div class="card">
    <h2>Check Your Limit</h2>

    <input type="text" id="phone" placeholder="Enter Phone Number">

    <button onclick="checkLimit()">Check Now</button>

    <div class="result" id="result"></div>
  </div>

  <div class="footer">
    Powered by Fuliza Boost System
  </div>
</div>

<script>
function checkLimit() {
  const phone = document.getElementById("phone").value;
  const result = document.getElementById("result");

  if (phone === "") {
    result.innerHTML = "⚠️ Please enter phone number";
    return;
  }

  result.innerHTML = "⏳ Checking your limit...";

  setTimeout(() => {
    let amount = Math.floor(Math.random() * 5000) + 500;
    result.innerHTML = "✅ Your Fuliza limit is KES " + amount;
  }, 2000);
}
</script>

</body>
</html>
