<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fuliza Boost</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #020617, #0f172a, #020617);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
}

/* CARD */
.card {
  background: rgba(17, 24, 39, 0.85);
  backdrop-filter: blur(12px);
  padding: 30px 25px;
  border-radius: 18px;
  width: 90%;
  max-width: 360px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.7);
}

/* HEADER */
header {
  font-size: 26px;
  font-weight: bold;
  margin-bottom: 10px;
  color: #38bdf8;
}

/* TEXT */
h2 {
  margin-bottom: 8px;
}

p {
  color: #9ca3af;
  font-size: 14px;
  margin-bottom: 15px;
}

/* INPUTS */
input {
  width: 100%;
  padding: 14px;
  margin-top: 12px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.1);
  outline: none;
  background: rgba(255,255,255,0.05);
  color: white;
  font-size: 15px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  margin-top: 18px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: white;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px rgba(34,197,94,0.8);
}

/* LOADING TEXT */
#loading {
  margin-top: 10px;
  font-size: 13px;
  color: #22c55e;
}

/* FOOTER */
.info {
  margin-top: 18px;
  font-size: 13px;
  color: #6b7280;
}
</style>
</head>

<body>

<div class="card">
  <header>Fuliza Boost 🚀</header>

  <h2>Request Boost</h2>
  <p>Quick and easy access to funds</p>

  <p id="loading">⚡ Connecting to server...</p>

  <form onsubmit="submitForm(event)">
    <input type="text" placeholder="Phone Number" required>
    <input type="number" placeholder="Amount (KES)" required>
    <button type="submit">Request Now</button>
  </form>

  <div class="info">
    Secure • Fast • Trusted
  </div>
</div>

<script>
function submitForm(e){
  e.preventDefault();
  alert("✅ Request received! Processing...");
}

// fake live updates
setInterval(() => {
  const messages = [
    "⚡ Connecting to secure server...",
    "🔄 Verifying number...",
    "📡 Syncing with system...",
    "✅ Almost done..."
  ];
  document.getElementById("loading").innerText =
    messages[Math.floor(Math.random() * messages.length)];
}, 2000);
</script>

</body>
</html>
