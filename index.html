<!DOCTYPE html>
<html>
<head>
  <title>FulizaBoost</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      width: 90%;
      max-width: 400px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      background: green;
      color: white;
      border: none;
      border-radius: 8px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 15px;
    }

    .box {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .live {
      background: #eef;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="card" id="app">
  <h2>Fuliza Plus+</h2>
  <p>OFFICIAL VERIFICATION PORTAL</p>

  <input id="phone" placeholder="Enter phone number" />
  <button onclick="start()">Check My Eligibility</button>
</div>

<script>
  const limits = [
    [3000,250],[5000,293],[7500,350],[10000,500],
    [12500,747],[16000,898],[21000,1015],[25500,1220],
    [30000,1533],[35000,1730],[45000,2000],[60000,2250],[70000,2500]
  ];

  const names = ["Faith W.","James K.","Brian M.","Sarah N."];

  function start() {
    const phone = document.getElementById("phone").value;
    if (!phone) return alert("Enter phone");

    document.getElementById("app").innerHTML = "Checking...";
    
    setTimeout(() => {
      document.getElementById("app").innerHTML = "Connecting...";
    }, 1500);

    setTimeout(showMain, 3000);
  }

  function showMain() {
    document.getElementById("app").innerHTML = `
      <h2>FulizaBoost</h2>
      <p>Instant Limit Increase • Same Day Access</p>

      <div class="live" id="live">Loading activity...</div>

      <h3>Select Your Limit</h3>
      <div class="grid">
        ${limits.map(l => `
          <div class="box">
            <strong>Ksh ${l[0]}</strong><br/>
            Fee: ${l[1]}
          </div>
        `).join("")}
      </div>
    `;

    setInterval(() => {
      const name = names[Math.floor(Math.random()*names.length)];
      const amt = limits[Math.floor(Math.random()*limits.length)][0];

      document.getElementById("live").innerText =
        `${name} boosted to Ksh ${amt} just now`;
    }, 3000);
  }
</script>

</body>
</html>
