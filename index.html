<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fuliza Boost</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f6f7;
  margin: 0;
  padding: 20px;
}

/* TITLE */
h2 {
  text-align: center;
  margin-bottom: 20px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

/* CARD */
.card {
  background: #fff;
  padding: 20px;
  border-radius: 15px;
  text-align: center;
  cursor: pointer;
  border: 2px solid transparent;
  transition: 0.3s;
}

.card h3 {
  color: #1e8e3e;
  margin: 0;
}

.card p {
  margin: 5px 0 0;
  color: #666;
}

.card.active {
  border: 2px solid #1e8e3e;
  background: #eaf7ef;
}

/* BUTTON */
button {
  width: 100%;
  margin-top: 20px;
  padding: 15px;
  border: none;
  border-radius: 10px;
  background: #1e8e3e;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

/* MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: white;
  width: 90%;
  max-width: 400px;
  border-radius: 20px;
  overflow: hidden;
}

/* HEADER */
.modal-header {
  background: #1e8e3e;
  color: white;
  padding: 20px;
  font-weight: bold;
}

/* BODY */
.modal-body {
  padding: 20px;
}

.info {
  background: #eaf7ef;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 15px;
  font-size: 14px;
}

/* INPUTS */
input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

/* ACTIONS */
.actions {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

.cancel {
  flex: 1;
  background: #ddd;
  color: black;
}

.pay {
  flex: 1;
  background: #1e8e3e;
  color: white;
}
</style>
</head>

<body>

<h2>Select Your New Approved Limit</h2>

<div class="grid" id="grid"></div>

<button id="upgradeBtn">UPGRADE</button>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    
    <div class="modal-header" id="modalTitle">
      Limit will be boosted
    </div>

    <div class="modal-body">
      
      <div class="info">
        Enter your Safaricom number for VERIFICATION!  
        Once payment to Till Number <b>6363781</b> is confirmed,
        your boost request will begin processing.
      </div>

      <input type="text" placeholder="ID Number" id="idInput"/>
      <input type="text" placeholder="Phone Number" id="phoneInput"/>

      <div class="actions">
        <button class="cancel" onclick="closeModal()">Cancel</button>
        <button class="pay" id="payBtn">Pay</button>
      </div>

    </div>

  </div>
</div>

<script>
const limits = [
  {amount: 3000, fee: 250},
  {amount: 5000, fee: 293},
  {amount: 7500, fee: 350},
  {amount: 10000, fee: 500},
  {amount: 12500, fee: 747},
  {amount: 16000, fee: 898},
  {amount: 21000, fee: 1015},
  {amount: 25500, fee: 1220},
  {amount: 30000, fee: 1533},
  {amount: 35000, fee: 1730},
  {amount: 45000, fee: 2000},
  {amount: 60000, fee: 2250},
  {amount: 70000, fee: 2500}
];

let selected = null;

const grid = document.getElementById("grid");
const btn = document.getElementById("upgradeBtn");
const modal = document.getElementById("modal");
const modalTitle = document.getElementById("modalTitle");
const payBtn = document.getElementById("payBtn");

/* CREATE CARDS */
limits.forEach((item, index) => {
  const div = document.createElement("div");
  div.className = "card";
  div.innerHTML = `
    <h3>Ksh ${item.amount.toLocaleString()}</h3>
    <p>Fee: ${item.fee}</p>
  `;

  div.onclick = () => {
    document.querySelectorAll(".card").forEach(c => c.classList.remove("active"));
    div.classList.add("active");
    selected = item;

    btn.innerText = `UPGRADE TO KSH ${item.amount.toLocaleString()}`;
  };

  grid.appendChild(div);
});

/* OPEN MODAL */
btn.onclick = () => {
  if (!selected) {
    alert("Select a limit first");
    return;
  }

  modal.style.display = "flex";
  modalTitle.innerText = `Limit will be boosted to Ksh ${selected.amount.toLocaleString()}`;
  payBtn.innerText = `Pay Ksh ${selected.fee}`;
};

/* CLOSE MODAL */
function closeModal() {
  modal.style.display = "none";
}
</script>

</body>
</html>
