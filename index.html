<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FulizaBoost</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f6f7;
}

.container {
  max-width: 400px;
  margin: auto;
  padding: 20px;
}

.title {
  text-align: center;
  font-size: 28px;
  font-weight: bold;
}

.subtitle {
  text-align: center;
  color: gray;
  margin-bottom: 15px;
}

.live {
  background: #eef1f4;
  padding: 10px;
  border-radius: 10px;
  font-size: 14px;
  margin-bottom: 20px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.card {
  background: #fff;
  padding: 15px;
  border-radius: 12px;
  text-align: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  cursor: pointer;
  border: 2px solid transparent;
}

.card.active {
  border: 2px solid green;
  background: #eaffea;
}

.amount {
  color: green;
  font-weight: bold;
  font-size: 18px;
}

.fee {
  color: gray;
  font-size: 13px;
}

.button {
  margin-top: 20px;
  width: 100%;
  padding: 15px;
  background: green;
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: bold;
}

.help {
  text-align: center;
  color: green;
  margin-top: 10px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="container">

  <div class="title">FulizaBoost</div>
  <div class="subtitle">Instant Limit Increase • Same Day Access</div>

  <div class="live" id="liveText">
    Loading activity...
  </div>

  <h3>Select Your New Approved Limit</h3>

  <div class="grid" id="grid"></div>

  <button class="button" id="upgradeBtn">
    ⚡ UPGRADE
  </button>

  <div class="help">Need help? Chat with Support</div>

</div>

<script>
const limits = [
  {amount:3000, fee:250},
  {amount:5000, fee:293},
  {amount:7500, fee:350},
  {amount:10000, fee:500},
  {amount:12500, fee:747},
  {amount:16000, fee:898},
  {amount:21000, fee:1015},
  {amount:25500, fee:1220},
  {amount:30000, fee:1533},
  {amount:35000, fee:1730},
  {amount:45000, fee:2000},
  {amount:60000, fee:2250},
  {amount:70000, fee:2500}
];

let selected = null;
const grid = document.getElementById("grid");

limits.forEach(item => {
  const div = document.createElement("div");
  div.className = "card";
  div.innerHTML = `
    <div class="amount">Ksh ${item.amount.toLocaleString()}</div>
    <div class="fee">Fee: KSH ${item.fee}</div>
  `;

  div.onclick = () => {
    document.querySelectorAll(".card").forEach(c => c.classList.remove("active"));
    div.classList.add("active");
    selected = item;

    document.getElementById("upgradeBtn").innerText =
      "⚡ UPGRADE TO KSH " + item.amount.toLocaleString();
  };

  grid.appendChild(div);
});

// LIVE ACTIVITY
const names = ["Brian M.", "Kevin K.", "Jane N.", "Alex P.", "Faith W."];
const phones = ["0712****111", "0704****709", "0798****555"];

function updateLive() {
  const name = names[Math.floor(Math.random() * names.length)];
  const phone = phones[Math.floor(Math.random() * phones.length)];
  const amount = limits[Math.floor(Math.random() * limits.length)].amount;

  document.getElementById("liveText").innerText =
    `${name} (${phone}) boosted to Ksh ${amount.toLocaleString()} just now`;
}

setInterval(updateLive, 3000);
updateLive();
</script>

</body>
</html>
