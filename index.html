<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fuliza Plus+</title>

<style>
body {
  font-family: Arial;
  background: #f3f4f6;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: white;
  padding: 25px;
  border-radius: 20px;
  width: 90%;
  max-width: 350px;
  text-align: center;
}

input {
  width: 100%;
  padding: 15px;
  margin: 10px 0;
  border-radius: 10px;
  border: 1px solid #ddd;
}

button {
  width: 100%;
  padding: 15px;
  background: green;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 16px;
}

.spinner {
  border: 4px solid #eee;
  border-top: 4px solid green;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  margin: auto;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="card" id="app">
  <h2>Fuliza Plus+</h2>
  <p>OFFICIAL VERIFICATION PORTAL</p>

  <input id="phone" placeholder="Enter M-Pesa Number">

  <!-- IMPORTANT: button type -->
  <button id="btn">Check My Eligibility</button>
</div>

<script>
// FIX: attach event properly
document.getElementById("btn").addEventListener("click", start);

function start() {
  const phone = document.getElementById("phone").value;

  if (!phone) {
    alert("Enter phone number");
    return;
  }

  step("Connecting...");
  setTimeout(() => step("Verifying CRB Status..."), 2000);
  setTimeout(() => step("Checking Usage History..."), 4000);
  setTimeout(() => success(phone), 6000);
}

function step(text) {
  document.getElementById("app").innerHTML = `
    <div class="spinner"></div>
    <h3>${text}</h3>
    <p>Accessing secure databases...</p>
  `;
}

function success(phone) {
  document.getElementById("app").innerHTML = `
    <h2>✅ Congratulations</h2>
    <p>${phone} is eligible for boost</p>
    <button onclick="final()">Proceed</button>
  `;
}

function final() {
  document.getElementById("app").innerHTML = `
    <h2>FulizaBoost</h2>
    <p>🔴 LIVE: Faith W. boosted to Ksh 45,000 just now</p>
    <p>Select Amount</p>

    <button>Ksh 3,000</button><br><br>
    <button>Ksh 5,000</button><br><br>
    <button>Ksh 10,000</button>
  `;
}
</script>

</body>
</html>
