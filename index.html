<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fuliza Boost</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f3f5f7;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  width:90%;
  max-width:400px;
  background:#fff;
  padding:20px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

input{
  width:100%;
  padding:15px;
  margin:10px 0;
  border-radius:12px;
  border:1px solid #ddd;
}

button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:12px;
  background:#1f9e4b;
  color:#fff;
  font-size:16px;
}

.loader{
  border:5px solid #eee;
  border-top:5px solid #1f9e4b;
  border-radius:50%;
  width:50px;
  height:50px;
  margin:20px auto;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  0%{transform:rotate(0);}
  100%{transform:rotate(360deg);}
}

.hidden{display:none;}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.box{
  padding:15px;
  background:#f7f8fa;
  border-radius:12px;
  cursor:pointer;
}

.box.active{
  border:2px solid #1f9e4b;
  background:#eaf7ee;
}

.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:flex;
  justify-content:center;
  align-items:center;
}

.modal-content{
  width:90%;
  max-width:400px;
  background:#fff;
  border-radius:20px;
  overflow:hidden;
}

.modal-header{
  background:#1f9e4b;
  color:#fff;
  padding:15px;
}

.modal-body{
  padding:20px;
}

.info{
  background:#eaf7ee;
  padding:12px;
  border-radius:10px;
  font-size:14px;
}

.modal-actions{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.cancel{
  flex:1;
  background:#eee;
}

.pay{
  flex:1;
  background:#1f9e4b;
  color:#fff;
}
</style>
</head>

<body>

<!-- STEP 1 -->
<div class="card" id="step1">
  <h2>Fuliza Plus+</h2>
  <p>Verify your identity</p>
  <input type="tel" id="number" placeholder="Enter M-Pesa Number">
  <button onclick="start()">Check My Eligibility</button>
</div>

<!-- LOADING -->
<div class="card hidden" id="loading">
  <div class="loader"></div>
  <h3 id="loadText">Connecting...</h3>
</div>

<!-- SUCCESS -->
<div class="card hidden" id="success">
  <h2>Congratulations!</h2>
  <p id="result"></p>
  <button onclick="showLimits()">Continue</button>
</div>

<!-- LIMITS -->
<div class="card hidden" id="limits">
  <h2>Select Limit</h2>

  <div class="grid">
    <div class="box">Ksh 3,000</div>
    <div class="box">Ksh 5,000</div>
    <div class="box">Ksh 7,500</div>
    <div class="box">Ksh 10,000</div>
    <div class="box">Ksh 12,500</div>
    <div class="box">Ksh 16,000</div>
    <div class="box">Ksh 21,000</div>
    <div class="box">Ksh 25,500</div>
    <div class="box">Ksh 30,000</div>
    <div class="box">Ksh 35,000</div>
    <div class="box">Ksh 45,000</div>
    <div class="box">Ksh 60,000</div>
    <div class="box">Ksh 70,000</div>
  </div>

  <br>
  <button onclick="openModal()" id="upgradeBtn">UPGRADE</button>
</div>

<!-- MODAL -->
<div class="modal hidden" id="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="modalTitle">Limit</h3>
    </div>

    <div class="modal-body">
      <p class="info">
        Pay via Till Number <b>6363781</b> to proceed.
      </p>

      <input placeholder="ID Number">
      <input id="phoneDisplay" readonly>

      <div class="modal-actions">
        <button class="cancel" onclick="closeModal()">Cancel</button>
        <button class="pay" onclick="pay()">Pay</button>
      </div>
    </div>
  </div>
</div>

<script>
let selected = "Ksh 3,000";

// START
function start(){
  let num = document.getElementById("number").value;
  if(num.length < 10){ alert("Enter valid number"); return; }

  document.getElementById("step1").classList.add("hidden");
  document.getElementById("loading").classList.remove("hidden");

  let steps = ["Connecting...","Verifying CRB...","Finalizing..."];
  let i=0;

  let int = setInterval(()=>{
    document.getElementById("loadText").innerText = steps[i];
    i++;
    if(i===steps.length){
      clearInterval(int);
      setTimeout(()=>{
        document.getElementById("loading").classList.add("hidden");
        document.getElementById("success").classList.remove("hidden");
        document.getElementById("result").innerText =
          num + " eligible for boost";
      },1000);
    }
  },1500);
}

// SHOW LIMITS
function showLimits(){
  document.getElementById("success").classList.add("hidden");
  document.getElementById("limits").classList.remove("hidden");
}

// SELECT BOX
document.querySelectorAll(".box").forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll(".box").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    selected = b.innerText;
    document.getElementById("upgradeBtn").innerText = "UPGRADE TO " + selected;
  }
});

// MODAL
function openModal(){
  document.getElementById("modal").classList.remove("hidden");
  document.getElementById("modalTitle").innerText =
    "Boost to " + selected;

  document.getElementById("phoneDisplay").value =
    document.getElementById("number").value;
}

function closeModal(){
  document.getElementById("modal").classList.add("hidden");
}

// PAY
function pay(){
  alert("Pay to Till Number 6363781");
}
</script>

</body>
</html>
