<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fuliza Boost</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f6f7;
  display: flex;
  justify-content: center;
}

.container {
  width: 100%;
  max-width: 420px;
  padding: 20px;
}

.card {
  background: #fff;
  border-radius: 20px;
  padding: 20px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.05);
}

.title {
  font-size: 26px;
  font-weight: bold;
}

.subtitle {
  color: gray;
  margin-bottom: 20px;
}

.input {
  width: 100%;
  padding: 15px;
  border-radius: 12px;
  border: 1px solid #ddd;
  margin-bottom: 15px;
  font-size: 16px;
}

.btn {
  width: 100%;
  padding: 15px;
  border-radius: 12px;
  border: none;
  background: #1e9e4a;
  color: white;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.limit {
  padding: 20px;
  border-radius: 14px;
  background: #fff;
  border: 1px solid #eee;
  cursor: pointer;
}

.limit.active {
  border: 2px solid #1e9e4a;
  background: #eaf7ef;
}

.amount {
  color: #1e9e4a;
  font-weight: bold;
  font-size: 18px;
}

.fee {
  font-size: 12px;
  color: gray;
}

.loader {
  border: 5px solid #eee;
  border-top: 5px solid #1e9e4a;
  border-radius: 50%;
  width: 50px;
  height: 50px;
  animation: spin 1s linear infinite;
  margin: 20px auto;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<div class="container">

  <!-- SCREEN 1 -->
  <div id="screen1" class="card">
    <h2 class="title">Fuliza Plus+</h2>
    <p class="subtitle">Verify to unlock higher limits</p>

    <input class="input" id="phone" placeholder="Enter M-Pesa Number">
    <button class="btn" onclick="startCheck()">Check My Eligibility</button>
  </div>

  <!-- SCREEN 2 -->
  <div id="screen2" class="card hidden">
    <div class="loader"></div>
    <h3 id="loadingText">Connecting...</h3>
    <p class="subtitle">Accessing secure databases...</p>
  </div>

  <!-- SCREEN 3 -->
  <div id="screen3" class="card hidden">
    <h2>Congratulations!</h2>
    <p id="resultText"></p>
    <button class="btn" onclick="showLimits()">Proceed to Upgrade</button>
  </div>

  <!-- SCREEN 4 -->
  <div id="screen4" class="hidden">
    <h2>FulizaBoost</h2>
    <p class="subtitle">Select Your New Approved Limit</p>

    <div class="grid" id="limits"></div>

    <button class="btn" id="upgradeBtn" style="margin-top:20px;">
      Upgrade
    </button>
  </div>

</div>

<script>

let selectedAmount = null;

const limits = [
  {amount:3000, fee:250},
  {amount:5000, fee:293},
  {amount:7500, fee:350},
  {amount:10000, fee:500},
  {amount:12500, fee:747},
  {amount:16000, fee:898},
  {amount:21000, fee:1015},
  {amount:25500, fee:1220},
  {amount:30000, fee:1533},
  {amount:35000, fee:1730},
  {amount:45000, fee:2000},
  {amount:60000, fee:2250},
  {amount:70000, fee:2500}
];

function startCheck() {
  document.getElementById("screen1").classList.add("hidden");
  document.getElementById("screen2").classList.remove("hidden");

  let steps = [
    "Connecting...",
    "Verifying CRB Status...",
    "Finalizing Trust Score..."
  ];

  let i = 0;

  let interval = setInterval(() => {
    document.getElementById("loadingText").innerText = steps[i];
    i++;

    if (i === steps.length) {
      clearInterval(interval);
      setTimeout(showSuccess, 1000);
    }
  }, 2000);
}

function showSuccess() {
  document.getElementById("screen2").classList.add("hidden");
  document.getElementById("screen3").classList.remove("hidden");

  let phone = document.getElementById("phone").value;
  document.getElementById("resultText").innerText =
    phone + " is eligible for a boost.";
}

function showLimits() {
  document.getElementById("screen3").classList.add("hidden");
  document.getElementById("screen4").classList.remove("hidden");

  let container = document.getElementById("limits");

  limits.forEach(item => {
    let div = document.createElement("div");
    div.className = "limit";

    div.innerHTML = `
      <div class="amount">Ksh ${item.amount}</div>
      <div class="fee">Fee: ${item.fee}</div>
    `;

    div.onclick = () => {
      document.querySelectorAll(".limit").forEach(x => x.classList.remove("active"));
      div.classList.add("active");
      selectedAmount = item.amount;

      document.getElementById("upgradeBtn").innerText =
        "Upgrade to Ksh " + item.amount;
    };

    container.appendChild(div);
  });
}

</script>

</body>
</html>
